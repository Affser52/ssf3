<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mescat Chat</title>
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Mescat</h1>
        <button id="reloadChatsBtn" class="ghost-btn" type="button">Обновить</button>
      </div>

      <div class="search-block">
        <input id="userSearchInput" type="text" placeholder="Поиск по username" />
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="section-title">Чаты</div>
      <div id="chatList" class="chat-list"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <div id="activeChatTitle" class="chat-title">Выбери чат</div>
          <div id="activeChatMeta" class="chat-meta">История загружается через HTTP API</div>
        </div>
        <div class="header-actions">
          <span id="connectionBadge" class="badge badge-offline">WS: offline</span>
        </div>
      </header>

      <section id="messagesContainer" class="messages-container"></section>

      <div id="loadMoreWrap" class="load-more-wrap hidden">
        <button id="loadMoreBtn" class="ghost-btn" type="button">Загрузить ещё</button>
      </div>

      <footer class="composer">
        <textarea id="messageInput" rows="3" placeholder="Введите сообщение"></textarea>
        <div class="composer-actions">
          <button id="rotateKeyBtn" class="ghost-btn" type="button">Новый ключ</button>
          <button id="sendMessageBtn" class="primary-btn" type="button">Отправить</button>
        </div>
      </footer>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/config.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/ws.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
